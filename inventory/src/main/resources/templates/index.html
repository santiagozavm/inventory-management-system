<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            Inventory Management System
        </a>
        <div class="text-white me-3">

            Bienvenido al sistema,

            <strong>

                <span sec:authentication="name"></span>

            </strong>

        </div>       

        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" href="/products">
                Productos
            </a>
            <a class="btn btn-outline-light" sec:authorize="hasRole('ADMIN')" href="/users">
                Usuarios
            </a>
            <form th:action="@{/logout}" method="post">

                <button type="submit"
                        class="btn btn-danger">
                    Cerrar Sesión
                </button>

            </form>
        </div>
        

    </div>

</nav>

<div class="container mt-5">

    <div class="text-center">

        <h1 class="display-4 mb-4">
            Inventory Management System
        </h1>

        <p class="lead mb-4">
            Sistema desarrollado con Spring Boot, MySQL y Thymeleaf.
        </p>
        <div class="row g-4">

            <!-- Productos -->
            <div class="col-md-3">

                <div class="card shadow border-primary h-100">

                    <div class="card-body text-center">

                        <h5 class="card-title">
                            📦 Productos
                        </h5>

                        <h2 class="text-primary"
                            th:text="${totalProducts}">
                        </h2>

                    </div>

                </div>

            </div>

            <!-- Usuarios -->
            <div class="col-md-3">

                <div class="card shadow border-success h-100">

                    <div class="card-body text-center">

                        <h5 class="card-title">
                            👥 Usuarios
                        </h5>

                        <h2 class="text-success"
                            th:text="${totalUsers}">
                        </h2>

                    </div>

                </div>

            </div>

            <!-- Inventario -->
            <div class="col-md-3">

                <div class="card shadow border-warning h-100">

                    <div class="card-body text-center">

                        <h5 class="card-title">
                            💲 Valor Inventario
                        </h5>

                        <h2 class="text-warning">

                            $
                            <span th:text="${inventoryValue}">
                            </span>

                        </h2>

                    </div>

                </div>

            </div>

            <!-- Próximamente -->
            <div class="col-md-3">

                <div class="card shadow border-info h-100">

                    <div class="card-body text-center">

                        <h5 class="card-title">
                            🚀 Estado
                        </h5>

                        <h2 class="text-info">

                            Activo

                        </h2>

                    </div>

                </div>

            </div>

        </div>



        <div class="mt-5 text-center">
            <a href="/products" class="btn btn-primary btn-lg">
                Ver Productos
            </a>
        </div>


    </div>

</div>

</body>
</html>
